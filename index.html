<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔥</text></svg>"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FIRE Tracker</title>
    <meta
      name="description"
      content="Track your path to Financial Independence, Retire Early — and run simulations against it."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <script>
      // Restore deep-link path stashed by 404.html (spa-github-pages trick).
      (function () {
        var l = window.location;
        if (l.search.indexOf("?p=/") === 0 || l.search.indexOf("&p=/") > -1) {
          var q = l.search.slice(1).split("&").reduce(function (acc, kv) {
            var i = kv.indexOf("=");
            acc[kv.slice(0, i)] = kv.slice(i + 1);
            return acc;
          }, {});
          var path = (q.p || "").replace(/~and~/g, "&");
          var search = q.q ? "?" + q.q.replace(/~and~/g, "&") : "";
          history.replaceState(
            null,
            "",
            l.pathname.replace(/\/$/, "") + path + search + l.hash,
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
